<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Painel de Missões</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-dark text-white p-4">

        <div class="container">
            <h1 class="text-center text-success mb-4">Painel de Missões</h1>
            <h4 id="contador" class="card bg-secondary text-white p-3 mb-4"></h4>
            
            <div class="card bg-secondary text-white p-4 mb-4 shadow">
                <div class="row g-2">
                    <div class="col-md-8">
                        <input type="text" id="in-titulo" class="form-control" placeholder="Título da Missão...">
                    </div>
                    <div class="col-md-4">
                        <button onclick="adicionarMissao()" class="btn btn-success w-100">Adicionar Missão</button>
                    </div>
                    
                </div>
            </div>
            <ul id="lista-html"class="list-group text-dark shadow"></ul>
        </div>

        <script>
            //Tenta pegar o 'saveGame', se não existir, cria uma lista vazia[]
            let bancoDeMissoes = JSON.parse(localStorage.getItem('saveGame')) || [];

            function salvarNoHD() {
                localStorage.setItem('saveGame', JSON.stringify(bancoDeMissoes));
            }
            //2 Função que desenha a tela
            function atualizarTela() {
                let ulHtml = document.getElementById('lista-html');
                ulHtml.innerHTML = ""; //Limpa a tela para não duplicar

                //O Loop For: Conta de 0 até o tamanho total a lista
                for(let i= 0; i < bancoDeMissoes.length; i++) {
                    let missao = bancoDeMissoes[i]; //Pega a missão da posição atual

                    let totalDeMissoes = bancoDeMissoes.length;
                    document.getElementById("contador").innerHTML = "Total de missões: "+totalDeMissoes;
                                           
                    //Injeta o HTML. Note o botão da Apagar passando o (i), que é a posição!
                    ulHtml.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <strong>${missao}</strong>
                        <button onclick="deletarMissao(${i})" class="btn btn-sm btn-danger">Apagar</button>
                    </li>
                `;
                }
            }

                atualizarTela();

            //3 Função de Adicionar
            function adicionarMissao() {
                let tituloDigitado = document.getElementById('in-titulo').value;

                if(tituloDigitado === "") {
                    alert("Digite o nome da missão!");
                    return;
                }

                //Empurra (push) o texto para dentro do Array
                bancoDeMissoes.push(tituloDigitado);

                //Limpa o input
                document.getElementById('in-titulo').value = "";

                salvarNoHD();

                //Manda desenhar a tela de novo
                atualizarTela();                
            }

            //4 Função de Apagar
            function deletarMissao(posicao) {
                //O splice vai na 'posicao' informada e arranca 1 item de lá
                bancoDeMissoes.splice(posicao, 1);
                
                salvarNoHD();

                //Manda desenhar a tela de novo (agora sem o item)
                atualizarTela();                
            }
            ;
        </script>
    </body>
</html>
