<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forja do Grifo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #222; color: #fff; font-family: Arial; padding: 20px;">
    <h1 class="text-success mb-3">Forja Mágica</h1>
    <select id="encantamento">
        <option value="fogo">Fogo</option>
        <option value="gelo">Gelo</option>
        <option value="raio">Raio</option>
    </select>
    <button onclick="forjaArma()" style="padding: 10px; cursor: pointer;"class="btn btn-primary mb-4">Melhorar Espada</button>
    <div id="resultado" style="margin-top: 20px; font-size: 20px;"></div>

    <button onclick="estoqueCompleto()" style="padding: 10px; cursor: pointer;" class="btn btn-danger mb-4">Mostrar Estoque</button>
    <div id="estoque" style="margin-top: 20px; font-size: 20px;"></div>

    <script src="script.js"></script>
    
</body>
</html>
