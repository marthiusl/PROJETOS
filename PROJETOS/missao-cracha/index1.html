<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador VIP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white p-5">
    <div class="container">
        <h1 class="text-center mb-4">Sistema de Acesso VIP</h1>
    </div>

    <div class="card txt-dark p-4 mb-4 shadow">
        <div class="row">

            <div class="col-md-6">
                <label>Nome do Participante:</label>
                <input type="text" id="campo-nome" class="form-control" placeholder="Digite o nome..."></input>
            </div>

            <div class="col-md-6">
                <label>Cargo do Participante:</label>
                <input type="text" id="campo-cargo" class="form-control" placeholder="Digite o cargo..."></input>
            </div>

            <div class="col-md6 d-flex align-items-end">
                <button onclick="gerarCracha()" class="btn btn-success w-100">
                    Gerar Crachá
                    
                </button>
                
            </div>
        </div>
    </div>

    <div id="area-do-cracha" class="d-flex justify-content-center">

    </div>

    <script>
        //Criamos a função que o botão está chamando lá em cima
        function gerarCracha(){
            
            //PASSO 1: O JS vai no HTML, acha o input pelo ID, e "roupa" o valor digitado
            let nomeDigitado = document.getElementById('campo-nome').value;

            let nomeCargo = document.getElementById('campo-cargo').value;
            
            //PASSO 2: O JS acha a div vazia onde o crachá vai nascer
            let tela = document.getElementById('area-do-cracha');

            if(nomeDigitado == ""){
                alert ("Digite um nome!");
                return;
                } 

            //PASSO 3: O JS injeta (innerHTML) um bloco de HTML dentro da tela
            // ATENÇÃO: Use CRASE ( ` ) para abrir e fechar esse bloco, não aspas simples!
            tela.innerHTML = `
            <div class="card text-dark p-3 text-center"
            style="width: 18rem; border: 3px solid #198754;">
            <h3 class="text-primary">Acesso VIP</h3>
            <hr>
            <h2>${nomeDigitado}</h2>
            <h2>${nomeCargo}</h2>
            </div>
            `;
            document.getElementById('campo-nome').value = "";
            document.getElementById('campo-cargo').value = "";
        }
    </script>
</body>
</html>
